<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Box Container</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0a0a0a;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:#fff;
}

.card{
max-width:500px;
width:100%;
background:#141414;
border:1px solid #222;
border-radius:24px;
padding:40px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,.4);
}

.logo{
font-size:42px;
font-weight:800;
margin-bottom:10px;
}

.sub{
color:#b5b5b5;
font-size:16px;
line-height:1.6;
margin-bottom:35px;
}

.botao{
display:block;
width:100%;
padding:18px;
background:#ffb800;
color:#000;
text-decoration:none;
font-weight:700;
font-size:18px;
border-radius:14px;
transition:.2s;
}

.botao:hover{
transform:translateY(-2px);
}

.info{
margin-top:25px;
font-size:14px;
color:#8f8f8f;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">BOX CONTAINER</div>

<p class="sub">
Reserve sua mesa e fale diretamente com nossa equipe pelo WhatsApp.
</p>

<a class="botao"
href="https://wa.me/555391699707?text=Olá,%20quero%20fazer%20uma%20reserva">
🍔 Fazer Reserva
</a>

<div class="info">
Santa Tecla • Bagé/RS
</div>

</div>

</body>
</html>
